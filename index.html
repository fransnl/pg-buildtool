<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href='https://fonts.googleapis.com/css?family=Roboto' rel='stylesheet'>
    <link rel="stylesheet" type="text/css" href="styles.css"/>
    <link rel="shortcut icon" type="image/x-icon" href="favicon.png"/>
    <script src="./main.js" defer></script>
    <title>PGBuildTool</title>
</head>
<body>
    <main>
        <h1>PGBuilderTool</h1>
        <div class="input-container" id="input-container">
            <input type="text" id="head" placeholder="Head slot id"/>
            <input type="text" id="chest" placeholder="Chest slot id"/>
            <input type="text" id="legs" placeholder="Legs slot id"/>
            <input type="text" id="feet" placeholder="Feet slot id"/>
            <input type="text" id="hands" placeholder="Hands slot id"/>
            <input type="text" id="mainhand" placeholder="Main Hand slot id"/>
            <input type="text" id="secondary" placeholder="Secondary slot id"/>
            <input type="text" id="necklace" placeholder="Necklace id"/>
            <input type="text" id="ring" placeholder="Ring slot id"/>
            <input type="text" id="racial" placeholder="Racial slot id"/>
            <button id="save-button">Save</button>
        </div>
        <div id="build-stats" class="build-stats">
            <div id="equipped-gear" class="equipped-gear">

            </div>
            <div class="stat-labels" id="stat-labels">

            </div>
        </div>
        <div id="sorting-buttons" class="sorting-buttons"></div>
        <div class="dark-bg">
            <div id="data-displayed" class="data-displayed"></div>
        </div>
    </main>
</body>
</html>
